# Demo configuration for local testing with Docker
# Uses in-memory SQLite and minimal external dependencies

app:
  title: B.C. government DevHub (Demo)
  baseUrl: http://localhost:7007
  support:
    url: 'https://github.com/bcgov/developer-portal/issues'
    items:
      - title: 'Something went wrong.'
        links:
          - url: 'https://github.com/bcgov/developer-portal/issues'
            title: 'Our GitHub issues.'
  # Disable analytics for demo
  analytics:
    snowplow:
      enabled: false
  wizards:
    enabled: false

organization:
  name: BCDevExchange

backend:
  baseUrl: http://localhost:7007
  listen:
    port: 7007
  # In-memory SQLite for demo
  database:
    client: better-sqlite3
    connection: ':memory:'
  cache:
    store: memory
  csp:
    connect-src: ["'self'", 'http:', 'https:']
    img-src:
      [
        "'self'",
        '*.gov.bc.ca',
        'github.com',
        'bcgov.github.io',
        'img.shields.io',
        'cdnjs.cloudflare.com/ajax/libs/emojione/',
        'data:',
      ]
    frame-src: ['www.youtube.com', 'miro.com']
  cors:
    origin: http://localhost:7007
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true

permission:
  enabled: true

# No external integrations for demo
integrations:
  github:
    - host: github.com

# Minimal proxy config for demo
proxy:
  endpoints:
    '/github-api':
      target: https://api.github.com
      allowedHeaders: ['Authorization', 'X-GitHub-Api-Version', 'Accept']
      credentials: require
      headers:
        X-GitHub-Api-Version: '2022-11-28'
        Accept: application/vnd.github+json

# TechDocs in local mode for demo
techdocs:
  builder: 'local'
  generator:
    runIn: 'local'
  publisher:
    type: 'local'
  sanitizer:
    allowedIframeHosts:
      - www.youtube.com
      - miro.com

# Guest auth only for demo (no GitHub auth required)
auth:
  environment: demo
  providers:
    guest:
      userEntityRef: user:default/guest
      dangerouslyAllowOutsideDevelopment: true

search:
  collators:
    catalog:
      schedule:
        initialDelay: { seconds: 3 }
        frequency: { minutes: 10 }
        timeout: { minutes: 15 }
      filter:
        kind:
          ['API', 'Component', 'Domain', 'Group', 'Resource', 'System', 'User']
    # doesn't work but throws angry errors if not provided
    githubDiscussions:
      # url: ${GITHUB_DISCUSSIONS_URL}
      url: https://github.com/bcgov/bcgov-community-discussions

# Minimal catalog config for demo
catalog:
  useUrlReadersSearch: true
  providers:
    bc-data-catalogue:
      env: dev
      schedule:
        frequency: 120m
  locations:
    - type: url
      target: https://github.com/bcgov/developer-experience-team/blob/main/developer-portal/catalog/catalog-seed-dev.yml
      rules:
        - allow: [Component]
    - type: url
      target: https://github.com/bcgov/developer-experience-team/blob/main/developer-portal/catalog/templates-seed-dev.yml
      rules:
        - allow: [Template]
    - type: url
      # target: https://github.com/bcgov/csit-connected-services-techdocs/blob/main/catalog-info.yaml
      target: https://github.com/bcgov/csit-connected-services-techdocs/blob/type-url/catalog-info.yaml
      rules:
        - allow: [Component]
    - type: url
      # target: https://github.com/bcgov/csit-connected-services-techdocs/blob/main/examples/seed-catalog-info.yaml
      target: https://github.com/bcgov/csit-connected-services-techdocs/blob/type-url/examples/seed-catalog-info.yaml
      rules:
        - allow: [Location, Component, API]
  rules:
    - allow: [Component, System, API, Resource, Location, Template, User, Group]
